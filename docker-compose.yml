version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: mini_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: mini_app
    restart: always
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - .:/app
    command: sh -c "npm run migrate && npm run dev"

volumes:
  pgdata: